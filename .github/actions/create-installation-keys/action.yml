name: 'Create Installation Keys'
description: 'Extract and decrypt installation keys from sfdx-project.json packageInstallationKeys section'
outputs:
  installation-keys:
    description: 'Space-separated list of package:key pairs for dependency installation'
    value: ${{ steps.create-keys.outputs.installationkeys }}

runs:
  using: 'composite'
  steps:
    - name: Create installation key string
      id: create-keys
      shell: bash
      run: |
        echo -n "installationkeys=" > $GITHUB_OUTPUT
        if [[ ! -f sfdx-project.json ]]; then
          echo "No sfdx-project.json found, skipping installation keys"
          exit 0
        fi
        
        # Check if packageInstallationKeys section exists
        if ! jq -e '.packageInstallationKeys' sfdx-project.json > /dev/null 2>&1; then
          echo "No packageInstallationKeys section found in sfdx-project.json"
          exit 0
        fi
        
        cat sfdx-project.json | jq -r '.packageInstallationKeys|to_entries[]|[.key,.value]|@tsv'| \
        while read line; do
          eval `echo "$line"|awk '{print "package="$1" encrypted_key="$2}'`
          eval `echo $encrypted_key|awk -F: '{print "encryption_method="$1" encrypted_key="$2}'`
          case $encryption_method in
            ccrypt)
              installation_key=`echo "$encrypted_key" | base64 --decode | ccat -k .vault-password`
              ;;
            plain)
              installation_key="$encrypted_key"
              ;;
            *)
              if [ "x$encrypted_key" == "x" ]; then
                # No encrypted key means there was no colon so key was plain text and encryption_method is actually the installation key
                installation_key="$encryption_method"
              else
                echo "Unsupported encryption method '$encryption_method' for package $package"
                exit 3
              fi
              ;;
          esac
          echo -n "$package:$installation_key "
        done >> $GITHUB_OUTPUT
